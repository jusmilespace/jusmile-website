<!DOCTYPE html>
<html lang="zh-TW">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微笑料理 - Smile Cuisine</title>
  <style>
    :root {
      --mint: #97d0ba;
      --mint-dark: #5c9c84;
      --mint-light: #e8f5f0;
      --mint-pale: #f4faf7;
      --charcoal: #1f2937;
      --warm-gray: #6b7785;
      --cream: #fdfcf9;
      --border: #e8f0ec;
      --white: #ffffff;

      /* 系列色碼 */
      --s-smile-bg: #FFE500;
      --s-smile-text: #7a6c00;
      --s-lab-bg: #97D0BA;
      --s-lab-text: #2d6e58;
      --s-grandma-bg: #D4A373;
      --s-grandma-text: #7a4e1e;
      --s-julia-bg: #C28E8E;
      --s-julia-text: #6b3535;
      --s-bar-bg: #7B9BAE;
      --s-bar-text: #1e4a5e;

      --font: "PingFang TC", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font);
      background: var(--cream);
      color: var(--charcoal);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* ── NAV ── */
    nav {
      background: var(--white);
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .nav-container {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
    }

    .logo {
      font-size: 24px;
      font-weight: 800;
      color: var(--mint-dark);
      text-decoration: none;
      letter-spacing: -0.8px;
      display: flex;
      align-items: center;
      line-height: 1;
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--charcoal);
      font-size: 0.95rem;
      font-weight: 500;
      transition: color 0.3s;
    }

    .nav-links a.active {
      color: var(--mint-dark);
    }

    .menu-toggle {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 5px;
    }

    .menu-toggle .bar {
      width: 25px;
      height: 3px;
      background-color: var(--charcoal);
      transition: 0.3s;
      border-radius: 2px;
    }

    /* --- 手機版 (768px 以下) --- */
    @media (max-width: 768px) {
      .menu-toggle {
        display: flex !important;
        z-index: 1001;
      }

      .nav-links {
        position: fixed;
        right: -100%;
        top: 0;
        width: 260px;
        height: 100vh;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        flex-direction: column;
        justify-content: flex-start;
        padding-top: 80px;
        transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
        box-shadow: -10px 0 30px rgba(0, 0, 0, 0.05);
      }

      .nav-links.active {
        right: 0;
      }

      .nav-links a {
        width: 100%;
        padding: 20px 30px;
        border-bottom: 1px solid #f9f9f9;
        text-align: left;
        display: block;
      }

      .menu-toggle.active .bar:nth-child(1) {
        transform: translateY(8px) rotate(45deg);
      }

      .menu-toggle.active .bar:nth-child(2) {
        opacity: 0;
      }

      .menu-toggle.active .bar:nth-child(3) {
        transform: translateY(-8px) rotate(-45deg);
      }
    }

    /* ── HERO ── */
    .hero {
      padding: 72px 40px 48px;
      text-align: center;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: -80px;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(151, 208, 186, 0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .hero-tag {
      display: inline-block;
      background: var(--mint-light);
      color: var(--mint-dark);
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 20px;
      margin-bottom: 18px;
    }

    .hero h1 {
      font-size: clamp(2rem, 4.5vw, 3.2rem);
      font-weight: 800;
      line-height: 1.2;
      margin-bottom: 14px;
      letter-spacing: -0.5px;
    }

    .hero h1 em {
      font-style: normal;
      color: var(--mint-dark);
    }

    .hero p {
      font-size: 0.98rem;
      color: var(--warm-gray);
      max-width: 420px;
      margin: 0 auto;
      line-height: 1.8;
      font-weight: 400;
    }

    /* ── 搜尋、標籤、列表等剩餘樣式保持原樣 ── */
    .search-wrap {
      max-width: 560px;
      margin: 32px auto 0;
      padding: 0 40px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 12px;
      background: white;
      border: 1.5px solid var(--border);
      border-radius: 50px;
      padding: 10px 20px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-box:focus-within {
      border-color: var(--mint);
      box-shadow: 0 0 0 3px rgba(151, 208, 186, 0.15);
    }

    .search-icon {
      font-size: 16px;
      opacity: 0.45;
    }

    .search-box input {
      flex: 1;
      border: none;
      outline: none;
      background: transparent;
      font-size: 0.92rem;
      font-family: var(--font);
      color: var(--charcoal);
    }

    .search-clear {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #e5e9e7;
      border: none;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .search-clear.visible {
      display: flex;
    }

    .search-hint {
      text-align: center;
      margin-top: 10px;
      font-size: 0.75rem;
      color: #bbc5bf;
    }

    .series-bar {
      padding: 28px 40px 0;
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      max-width: 1200px;
      margin: 0 auto;
    }

    .series-bar::-webkit-scrollbar {
      display: none;
    }

    .series-pill {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 8px 16px;
      border-radius: 40px;
      border: 1.5px solid var(--border);
      font-size: 0.84rem;
      font-weight: 600;
      background: white;
      color: var(--warm-gray);
      cursor: pointer;
    }

    .series-pill .dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
    }

    .series-pill.active {
      background: var(--charcoal);
      color: white;
      border-color: var(--charcoal);
    }

    .series-pill[data-series="微笑料理"].active {
      background: var(--s-smile-bg);
      color: var(--s-smile-text);
      border-color: var(--s-smile-bg);
    }

    .series-pill[data-series="料理實驗室"].active {
      background: var(--s-lab-bg);
      color: var(--s-lab-text);
      border-color: var(--s-lab-bg);
    }

    .series-pill[data-series="阿嬤的私房菜"].active {
      background: var(--s-grandma-bg);
      color: var(--s-grandma-text);
      border-color: var(--s-grandma-bg);
    }

    .series-pill[data-series="Julia Child 經典重現"].active {
      background: var(--s-julia-bg);
      color: var(--s-julia-text);
      border-color: var(--s-julia-bg);
    }

    .series-pill[data-series="微笑吧台"].active {
      background: var(--s-bar-bg);
      color: white;
      border-color: var(--s-bar-bg);
    }

    .filter-bar {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
      padding: 16px 40px 36px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .filter-btn {
      padding: 5px 14px;
      border-radius: 40px;
      border: 1.5px solid var(--border);
      background: white;
      color: var(--warm-gray);
      font-size: 0.8rem;
      cursor: pointer;
    }

    .filter-btn.active {
      background: var(--mint-dark);
      color: white;
      border-color: var(--mint-dark);
    }

    .recipes-section {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 40px 100px;
    }

    .recipes-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .recipe-card {
      background: white;
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid var(--border);
      transition: 0.28s;
      cursor: pointer;
    }

    .recipe-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 40px rgba(92, 156, 132, 0.14);
    }

    .card-thumb {
      position: relative;
      width: 100%;
      padding-top: 58%;
      overflow: hidden;
      background: #000;
    }

    .card-thumb img,
    .card-thumb video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-series-badge {
      position: absolute;
      top: 11px;
      left: 11px;
      font-size: 0.68rem;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 20px;
    }

    .card-body {
      padding: 16px 18px 18px;
    }

    .card-title-zh {
      font-size: 1.05rem;
      font-weight: 700;
      margin-bottom: 2px;
    }

    .tag {
      font-size: 0.68rem;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 20px;
      background: var(--mint-pale);
      color: var(--mint-dark);
    }

    /* ── 詳細頁樣式保持原樣 ── */
    .detail-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(31, 41, 55, 0.6);
      backdrop-filter: blur(8px);
      padding: 20px;
      overflow-y: auto;
    }

    .detail-overlay.active {
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }

    .detail-modal {
      background: var(--cream);
      border-radius: 24px;
      width: 100%;
      max-width: 780px;
      margin: 20px auto;
      overflow: hidden;
      position: relative;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.25);
    }

    .detail-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: white;
      border: none;
      cursor: pointer;
      z-index: 10;
      font-weight: bold;
    }

    .detail-video {
      position: relative;
      width: 100%;
      padding-top: 56.25%;
      background: #000;
    }

    .detail-video iframe,
    .detail-video video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .detail-content {
      padding: 28px 36px 44px;
    }

    @media (max-width: 768px) {
      .recipes-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px;
      }

      .hero {
        padding: 52px 20px 32px;
      }

      .search-wrap,
      .series-bar,
      .filter-bar,
      .recipes-section {
        padding-left: 20px;
        padding-right: 20px;
      }
    }

    @media (max-width: 480px) {
      .recipes-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <nav>
    <div class="nav-container">
      <a href="index.html" class="logo">Ju Smile Space</a>
      <div class="menu-toggle" id="mobile-menu">
        <span class="bar"></span>
        <span class="bar"></span>
        <span class="bar"></span>
      </div>
      <div class="nav-links" id="nav-links">
        <a href="index.html">首頁</a>
        <a href="https://app.jusmilespace.com">產品介紹</a>
        <a href="recipes.html" class="active">微笑料理</a>
        <a href="https://app.jusmilespace.com/support.html">☕️ 支持我們</a>
        <a href="privacy-policy.html">隱私權政策</a>
        <a href="index.html#contact">聯絡我們</a>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-tag">微笑料理 · Smile Cuisine</div>
    <h1>讓<em>微笑</em>・成為生活裡最好的<em>調味料</em></h1>
  </section>

  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="搜尋食譜名稱、食材、標籤…" oninput="handleSearch(this.value)">
      <button class="search-clear" id="searchClear" onclick="clearSearch()">✕</button>
    </div>
  </div>

  <div class="series-bar">
    <button class="series-pill active" data-series="all" onclick="filterBySeries('all',this)">全部</button>
    <button class="series-pill" data-series="微笑料理" onclick="filterBySeries('微笑料理',this)">微笑料理</button>
    <button class="series-pill" data-series="料理實驗室" onclick="filterBySeries('料理實驗室',this)">料理實驗室</button>
    <button class="series-pill" data-series="阿嬤的私房菜" onclick="filterBySeries('阿嬤的私房菜',this)">阿嬤的私房菜</button>
    <button class="series-pill" data-series="Julia Child 經典重現" onclick="filterBySeries('Julia Child 經典重現',this)">Julia
      Child</button>
    <button class="series-pill" data-series="微笑吧台" onclick="filterBySeries('微笑吧台',this)">微笑吧台</button>
  </div>

  <div class="filter-bar">
    <button class="filter-btn active" onclick="filterByTag('all',this)">全部</button>
    <button class="filter-btn" onclick="filterByTag('快速',this)">快速</button>
    <button class="filter-btn" onclick="filterByTag('低卡',this)">低卡</button>
    <button class="filter-btn" onclick="filterByTag('高蛋白',this)">高蛋白</button>
  </div>

  <section class="recipes-section">
    <div class="section-meta">
      <div class="section-label" id="sectionLabel">所有食譜</div>
      <div class="search-result-tag" id="searchResultTag"><span>🔍</span><span id="searchResultText"></span></div>
    </div>
    <div class="recipes-grid" id="recipesGrid"></div>
  </section>

  <div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
    <div class="detail-modal">
      <button class="detail-close" onclick="closeDetailBtn()">✕</button>
      <div class="detail-video" id="detailVideo"></div>
      <div class="detail-series-bar" id="detailSeriesBar"></div>
      <div class="detail-content" id="detailContent"></div>
    </div>
  </div>

  <footer style="position: relative; text-align: center; padding: 60px 20px; opacity: 0.6; font-size: 0.9em;">
    <p>© 2026 Ju Smile. All rights reserved.</p>
    <a href="/admin/" id="admin-trigger"
      style="position: absolute; bottom: 0; right: 0; width: 40px; height: 40px; cursor: default;"></a>
  </footer>

  <script>
    // 這裡保留您原本所有的 JavaScript 邏輯 (CUSTOM_ICONS, SERIES, renderGrid, init 等)
    const CUSTOM_ICONS = { prep: 'assets/icons/prep.png', step: 'assets/icons/step.png', tip: 'assets/icons/tip.png', ingr: 'assets/icons/ingr.png' };
    const BRAND_VIDEO = 'assets/brand/logo-animation-A.mp4';
    const SERIES = {
      '微笑料理': { bg: '#FFE500', text: '#7a6c00', grad: 'linear-gradient(135deg,#FFE500,#ffd000)' },
      '料理實驗室': { bg: '#97D0BA', text: '#2d6e58', grad: 'linear-gradient(135deg,#97D0BA,#6bb89e)' },
      '阿嬤的私房菜': { bg: '#D4A373', text: '#7a4e1e', grad: 'linear-gradient(135deg,#D4A373,#c08850)' },
      'Julia Child 經典重現': { bg: '#C28E8E', text: '#6b3535', grad: 'linear-gradient(135deg,#C28E8E,#a86868)' },
      '微笑吧台': { bg: '#7B9BAE', text: '#ffffff', grad: 'linear-gradient(135deg,#7B9BAE,#5a7d92)' },
    };
    function getSeries(s) { return SERIES[s] || { bg: '#97d0ba', text: '#2d6e58', grad: 'linear-gradient(135deg,#97d0ba,#5c9c84)' }; }

    let recipes = [];
    let currentSeries = 'all';
    let currentTag = 'all';
    let currentSearch = '';

    function handleSearch(val) { currentSearch = val.trim(); renderGrid(); }
    function clearSearch() { currentSearch = ''; document.getElementById('searchInput').value = ''; renderGrid(); }
    function filterBySeries(series, btn) { currentSeries = series; document.querySelectorAll('.series-pill').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderGrid(); }
    function filterByTag(tag, btn) { currentTag = tag; document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); renderGrid(); }

    function renderGrid() {
      const list = recipes.filter(r => {
        const matchSeries = currentSeries === 'all' || r.series === currentSeries;
        const matchTag = currentTag === 'all' || r.tags.includes(currentTag);
        const matchSearch = !currentSearch || r.titleZh.toLowerCase().includes(currentSearch.toLowerCase());
        return matchSeries && matchTag && matchSearch;
      });
      const grid = document.getElementById('recipesGrid');
      grid.innerHTML = list.map(r => `
        <div class="recipe-card" onclick="openDetail('${r.id}')">
          <div class="card-thumb">
            ${r.youtubeId ? `<img src="https://img.youtube.com/vi/${r.youtubeId}/maxresdefault.jpg">` : `<video src="${BRAND_VIDEO}" autoplay muted loop></video>`}
            <div class="card-series-badge" style="background:${getSeries(r.series).bg}">${r.series}</div>
          </div>
          <div class="card-body">
            <div class="card-title-zh">${r.titleZh}</div>
          </div>
        </div>`).join('');
    }

    function openDetail(id) {
      const r = recipes.find(r => String(r.id) === String(id));
      const s = getSeries(r.series);
      document.getElementById('detailVideo').innerHTML = r.youtubeId ? `<iframe src="https://www.youtube.com/embed/${r.youtubeId}?autoplay=1" allowfullscreen></iframe>` : `<video src="${BRAND_VIDEO}" autoplay muted loop></video>`;
      document.getElementById('detailSeriesBar').style.background = s.grad;
      document.getElementById('detailContent').innerHTML = `<h2>${r.titleZh}</h2><p>${r.hook}</p>`;
      document.getElementById('detailOverlay').classList.add('active');
    }
    function closeDetailBtn() { document.getElementById('detailOverlay').classList.remove('active'); document.getElementById('detailVideo').innerHTML = ''; }

    // 初始化漢堡選單 JS
    const menuBtn = document.getElementById('mobile-menu');
    const navLinks = document.getElementById('nav-links');
    menuBtn.addEventListener('click', () => { menuBtn.classList.toggle('active'); navLinks.classList.toggle('active'); });

    fetch('./data/recipes.json').then(res => res.json()).then(data => { recipes = data; renderGrid(); });
  </script>
</body>

</html>
